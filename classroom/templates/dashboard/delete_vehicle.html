{% load widget_tweaks %}

<form method="post" action="{% url 'delete_vehicle' object.pk %}">
  {% csrf_token %}

  <div class="modal-header">
    <h3 class="modal-title text-danger">Delete Data</h3>
    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
  </div>

  <div class="modal-body">
    <p class="delete-text">Are you sure do you want to delete details of customer
      <strong>{{ customer.first_name }}</strong>?</p>
  </div>

  <div class="modal-footer">
    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
    <button type="submit" id="delete-btn" class="btn btn-danger">Delete</button>
  </div>

</form>
